<script>
    function shop() {
        return {
            // --- INITIAL STATE ---
            cartOpen: false,
            paymentModalOpen: false,
            searchQuery: '',
            sortOrder: 'newest',
            currentCategory: 'All Products',
            categories: ['All Products', 'On Sale', 'Gunpla Kits', 'Pokemon TCG', 'One Piece TCG', 'Riftbound TCG', 'Gundam TCG', 'Lorcana TCG', 'Magic The Gathering', 'Weiss Schwarz TCG', 'Dragonball TCG'],
            cart: [],
            products: [],

            // --- FETCH & PARSE TSV ---
            async init() {
                const TSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQu6_etrFg2rG9FpaLsWEHaHdULafjhzq7h4ZmMU_U_ZbXp5j5Cu7eTLNpaK2N5eE3ZgtYusX4ze9k5/pub?gid=0&single=true&output=tsv'; 
                
                try {
                    const response = await fetch(TSV_URL);
                    const data = await response.text();
                    
                    const rows = data.split('\n').filter(row => row.trim() !== '');
                    const headers = rows[0].split('\t').map(h => h.trim().toLowerCase()); // Force headers to lowercase

                    // Helper to remove commas/currency symbols before math
                    const cleanNumber = (val) => {
                        if (!val) return 0;
                        const cleaned = val.toString().replace(/[^0-9.-]+/g, "");
                        return parseFloat(cleaned) || 0;
                    };

                    this.products = rows.slice(1).map((row, index) => {
                        const values = row.split('\t');
                        let p = {};
                        headers.forEach((header, i) => {
                            p[header] = values[i]?.trim();
                        });

                        return {
                            id: parseInt(p.id) || index,
                            name: p.name,
                            category: p.category,
                            type: p.type,
                            set: p.set,
                            price: cleanNumber(p.price),
                            originalPrice: p.originalprice ? cleanNumber(p.originalprice) : null, // Note: originalprice is now lowercase
                            image: p.image,
                            soldOut: p.soldout?.toLowerCase() === 'true', // Note: soldout is now lowercase
                            selectedQty: 1,
                            justAdded: false
                        };
                    });
                } catch (error) {
                    console.error("Error loading inventory:", error);
                }
            },

            // --- GETTERS ---
            get cartTotal() {
                const total = this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                return total.toLocaleString();
            },

            get totalItems() {
                return this.cart.reduce((sum, item) => sum + item.quantity, 0);
            },

            get filteredProducts() {
                return this.products.filter(p => {
                    const matchesSearch = p.name && p.name.toLowerCase().includes(this.searchQuery.toLowerCase());
                    let matchesCat = false;
                    
                    if (this.currentCategory === 'All Products') {
                        matchesCat = true;
                    } else if (this.currentCategory === 'On Sale') {
                        matchesCat = !!p.originalPrice; 
                    } else {
                        matchesCat = p.category === this.currentCategory;
                    }
                    return matchesSearch && matchesCat;
                }).sort((a, b) => {
                    if (a.soldOut !== b.soldOut) return a.soldOut - b.soldOut;
                    
                    if (this.sortOrder === 'low') return a.price - b.price;
                    if (this.sortOrder === 'high') return b.price - a.price;
                    return b.id - a.id;
                });
            },

            // --- METHODS ---
            getCategoryCount(cat) {
                if (cat === 'All Products') return this.products.length;
                if (cat === 'On Sale') return this.products.filter(p => p.originalPrice).length;
                return this.products.filter(p => p.category === cat).length;
            },

            addToCart(product) {
                const existing = this.cart.find(i => i.id === product.id);
                if (existing) {
                    existing.quantity += product.selectedQty;
                } else {
                    this.cart.push({ ...product, quantity: product.selectedQty });
                }
                product.justAdded = true;
                setTimeout(() => product.justAdded = false, 1000);
                product.selectedQty = 1; 
            },

            updateCartQty(index, change) {
                this.cart[index].quantity += change;
                if (this.cart[index].quantity <= 0) this.cart.splice(index, 1);
            },

            checkoutSelf() {
                this.cartOpen = false;
                this.paymentModalOpen = true;
            },

            async confirmAndRedirect() {
                // 1. Generate and Copy the Order Summary (FIXED FOR IN-STOCK PRODUCTS)
                let summary = "🛒 ORDER SUMMARY\n-----------------\n";
                this.cart.forEach(i => {
                    summary += `• ${i.quantity}x ${i.name}\n  Price: ₱${(i.price * i.quantity).toLocaleString()}\n\n`;
                });
                
                // Use standard cartTotal instead of missing deposit variables
                summary += `TOTAL AMOUNT: ₱${this.cartTotal}\n`;
                summary += `STATUS: Payment Pending\n`;

                try {
                    await navigator.clipboard.writeText(summary);
                } catch (err) {
                    console.error('Clipboard failed', err);
                }

                // 2. Platform Detection
                const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                             (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

                // 3. Conditional Redirection
                if (isIOS) {
                    window.location.href = "fb-messenger://user-thread/745474078647634";
                } else {
                    window.open("https://m.me/cratedropcollective", "_blank");
                }
            }
        } 
    }
    </script>
