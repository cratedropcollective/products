<script>
        function shop() {
            return {
                cartOpen: false,
                searchQuery: '',
                sortOrder: 'low',
                currentCategory: 'All Products',
                showCopiedToast: false,
                categories: ['All Products', 'On Sale', 'Pokemon TCG', 'One Piece TCG', 'Gundam TCG', 'Lorcana TCG', 'Magic The Gathering', 'Weiss Schwarz TCG', 'Dragonball TCG', 'Product Accessory'],
                cart: [],
                
                products: [
                    // ... (Product 1-10 remain the same)
                    // Note: Ensure your "On Sale" items have an originalPrice property
                ],

                getCategoryCount(cat) {
                    if (cat === 'All Products') return this.products.length;
                    // FIX: This ensures the "On Sale" button count matches the actual items on sale
                    if (cat === 'On Sale') return this.products.filter(p => p.originalPrice && p.originalPrice > p.price).length;
                    return this.products.filter(p => p.category === cat).length;
                },

                get filteredProducts() {
                    let items = this.products.filter(p => {
                        const matchesSearch = p.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                             p.set.toLowerCase().includes(this.searchQuery.toLowerCase());
                        
                        let matchesCategory = false;
                        if (this.currentCategory === 'All Products') {
                            matchesCategory = true;
                        } else if (this.currentCategory === 'On Sale') {
                            // FIX: Logic check for sale items
                            matchesCategory = !!(p.originalPrice && p.originalPrice > p.price);
                        } else {
                            matchesCategory = p.category === this.currentCategory;
                        }

                        return matchesSearch && matchesCategory;
                    });

                    // Sorting Logic
                    if (this.sortOrder === 'low') {
                        return items.sort((a, b) => a.price - b.price);
                    } else if (this.sortOrder === 'high') {
                        return items.sort((a, b) => b.price - a.price);
                    } else {
                        // "Latest" sort uses the ID (higher ID = newer)
                        return items.sort((a, b) => b.id - a.id);
                    }
                },

                // Rest of your cart functions (addToCart, updateQty, checkout) remain identical...
            }
        }
    </script>
