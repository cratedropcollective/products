<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate Drop Collective | TCG Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans" x-data="shop()">

    <nav class="bg-slate-900 text-white p-5 sticky top-0 z-50 shadow-xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter">CRATE DROP <span class="text-blue-500">COLLECTIVE</span></h1>
            <button @click="cartOpen = true" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-full flex items-center transition-all transform hover:scale-105">
                <i class="fas fa-shopping-basket mr-2"></i>
                <span class="font-bold" x-text="cart.length"></span> Items — $<span x-text="total"></span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto py-12 px-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="product in products" :key="product.id">
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-2xl transition-all duration-300 border border-gray-100 overflow-hidden group">
                    <div class="relative overflow-hidden bg-gray-100 p-6">
                        <img :src="product.image" :alt="product.name" class="w-full h-64 object-contain transform group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold bg-blue-100 text-blue-700 px-2 py-1 rounded shadow-sm" x-text="product.set"></span>
                            <span class="text-[10px] font-bold bg-gray-100 text-gray-600 px-2 py-1 rounded" x-text="product.condition"></span>
                        </div>
                        <h2 class="text-lg font-bold text-slate-800 mb-4 h-12 overflow-hidden" x-text="product.name"></h2>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-black text-slate-900">$<span x-text="product.price"></span></span>
                            <button @click="addToCart(product)" class="bg-slate-900 text-white p-3 rounded-xl hover:bg-blue-600 transition-colors">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-show="cartOpen" x-transition.opacity class="fixed inset-0 z-[60] bg-slate-900/60 backdrop-blur-sm" @click="cartOpen = false" style="display: none;"></div>
    <div x-show="cartOpen" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         class="fixed right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl z-[70] p-8 overflow-y-auto" style="display: none;">
        
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Your Drop</h2>
            <button @click="cartOpen = false" class="text-slate-400 hover:text-slate-900 transition text-3xl">&times;</button>
        </div>

        <div class="space-y-6">
            <template x-for="(item, index) in cart" :key="index">
                <div class="flex items-center justify-between group">
                    <div class="flex items-center">
                        <img :src="item.image" class="w-16 h-16 object-contain bg-gray-50 rounded-lg p-1 mr-4">
                        <div>
                            <p class="font-bold text-slate-800 leading-tight" x-text="item.name"></p>
                            <p class="text-xs text-blue-600 font-bold" x-text="item.condition"></p>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <span class="font-bold text-slate-900 mr-4">$<span x-text="item.price"></span></span>
                        <button @click="removeFromCart(index)" class="text-gray
